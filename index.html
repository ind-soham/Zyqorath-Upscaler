<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyqorath Upscaler</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@0.10.0-beta.10/dist/browser/umd/upscaler.min.js"></script>

    <style>
        /* Zyqorath Dark Theme */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
        }
        h2 { color: #00ffcc; font-size: 2.5rem; margin-bottom: 5px; }
        p { color: #aaaaaa; margin-bottom: 30px; }
        
        .upload-section { margin: 20px 0; }
        input[type="file"] { margin-bottom: 15px; color: #fff; }
        
        button {
            background-color: #00ffcc; color: #121212; border: none;
            padding: 12px 24px; font-size: 16px; font-weight: bold;
            border-radius: 6px; cursor: pointer; transition: all 0.3s ease;
        }
        button:disabled { background-color: #444; color: #888; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #00ccaa; transform: scale(1.05); }

        #downloadBtn {
            display: none; margin-top: 15px; background-color: #ff007f; 
            color: white; width: 100%;
        }
        #downloadBtn:hover { background-color: #cc0066; }

        #status { margin-top: 20px; font-weight: bold; color: #00ffcc; padding: 10px; }

        .image-container { 
            display: flex; justify-content: center; flex-wrap: wrap; 
            gap: 30px; margin-top: 40px; 
        }
        .img-box { 
            background: #1e1e1e; padding: 20px; border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex;
            flex-direction: column; align-items: center;
        }
        h3 { margin-top: 0; color: #eeeeee; }
        img { max-width: 100%; width: 300px; border-radius: 6px; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Zyqorath Upscaler</h2>
    <p>100% Free, Client-Side AI Image Enhancement</p>
    
    <div class="upload-section">
        <input type="file" id="imageInput" accept="image/png, image/jpeg"><br>
        <button id="upscaleBtn" disabled>Enhance with Zyqorath</button>
    </div>

    <div id="status">System Ready: Initializing AI core...</div>

    <div class="image-container">
        <div class="img-box">
            <h3>Original Data</h3>
            <img id="originalImg" alt="Original Image">
        </div>
        <div class="img-box">
            <h3>Zyqorath Output</h3>
            <img id="upscaledImg" alt="Upscaled Image">
            <button id="downloadBtn">Download Enhanced Image</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
